name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sanketsudrik
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Docker Image
        run: |
          docker build \
            --build-arg APP_VERSION=v${{ github.run_number }} \
            -t sanketsudrik/flask-devops-app:latest \
            -t sanketsudrik/flask-devops-app:v${{ github.run_number }} \
            -t sanketsudrik/flask-devops-app:sha-${{ github.sha }} \
            .
          docker push sanketsudrik/flask-devops-app:latest
          docker push sanketsudrik/flask-devops-app:v${{ github.run_number }}
          docker push sanketsudrik/flask-devops-app:sha-${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy — Skipped (no EC2)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
    

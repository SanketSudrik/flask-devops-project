name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u sanketsudrik --password-stdin
      - name: Build and Push
        run: |
          docker build -t sanketsudrik/flask-devops-app:latest -t sanketsudrik/flask-devops-app:v${{ github.run_number }} .
          docker push sanketsudrik/flask-devops-app:latest
          docker push sanketsudrik/flask-devops-app:v${{ github.run_number }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
